name: AI-Driven Verilog Lab Pipeline

on:
  issue_label:
    - "rtl requested"
    - "tb requested"
    - "doc requested"

jobs:
  rtl_generation:
    name: RTL Generation
    runs-on: ubuntu-latest
    outputs:
      rtl_json: ${{ steps.parse_json.outputs.agent_json }}
    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md NAMING_CONVENTIONS.md TESTPLAN.md > full_context.md

      - name: Run AI Agent to generate RTL
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ full_context.md }}

            TASK:
            Generate synthesizable RTL for module {{module_name}}.
            Include MANDATORY JSON OUTPUT as defined in template.
            EOF

      - name: Parse AI JSON output
        id: parse_json
        run: |
          echo "$AGENT_OUTPUT" | jq '.' > rtl_output.json
          echo "::set-output name=agent_json::$(cat rtl_output.json)"
          simulation_passed=$(jq '.simulation_passed' rtl_output.json)
          if [ "$simulation_passed" != "true" ]; then
            gh issue create --title "RTL Simulation Failed: {{module_name}}" \
              --body "Agent-generated RTL failed simulation. JSON output:\n$(cat rtl_output.json)"
            exit 1
          fi

      - name: Commit RTL files
        run: |
          git add rtl/*.v
          git commit -m "Add AI-generated RTL for {{module_name}}"
          git push

  tb_generation:
    name: Testbench Generation
    needs: rtl_generation
    runs-on: ubuntu-latest
    outputs:
      tb_json: ${{ steps.parse_json.outputs.agent_json }}
    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md TESTPLAN.md > tb_context.md

      - name: Run AI Agent to generate Testbench
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ tb_context.md }}

            TASK:
            Generate a Verilog testbench for module {{module_name}}.
            Include MANDATORY JSON OUTPUT.
            EOF

      - name: Parse AI JSON output
        id: parse_json
        run: |
          echo "$AGENT_OUTPUT" | jq '.' > tb_output.json
          echo "::set-output name=agent_json::$(cat tb_output.json)"
          simulation_passed=$(jq '.simulation_passed' tb_output.json)
          if [ "$simulation_passed" != "true" ]; then
            gh issue create --title "Testbench Simulation Failed: {{module_name}}" \
              --body "Agent-generated testbench failed simulation. JSON output:\n$(cat tb_output.json)"
            exit 1
          fi

      - name: Run simulation
        run: |
          iverilog -o sim.out rtl/*.v tb/*.v
          vvp sim.out
          if [ $? -ne 0 ]; then
            gh issue create --title "Simulation Execution Failed: {{module_name}}" \
              --body "Simulation failed during runtime. See agent output and logs."
            exit 1

  documentation_generation:
    name: Documentation Generation
    needs: tb_generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md TESTPLAN.md NAMING_CONVENTIONS.md > doc_context.md

      - name: Run AI Agent to generate Documentation
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ doc_context.md }}

            TASK:
            Generate detailed Markdown documentation for module {{module_name}}.
            Include MANDATORY JSON OUTPUT.
            EOF

      - name: Parse AI JSON output
        id: parse_json
        run: |
          echo "$AGENT_OUTPUT" | jq '.' > doc_output.json
          plan_completed=$(jq '.plan_item_completed' doc_output.json)
          if [ "$plan_completed" != "true" ]; then
            gh issue create --title "Documentation Incomplete: {{module_name}}" \
              --body "Agent-generated documentation incomplete. JSON output:\n$(cat doc_output.json)"
            exit 1

      - name: Commit Documentation
        run: |
          git add docs/*.md
          git commit -m "Add AI-generated documentation for {{module_name}}"
          git push
