name: Documentation Generation

on:
  issue_label:
    - "doc requested"

jobs:
  generate_docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md TESTPLAN.md NAMING_CONVENTIONS.md > doc_context.md

      - name: Generate Documentation
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ doc_context.md }}

            TASK:
            Write detailed Markdown documentation for the requested module or system.

            CRITERIA:
            - Include architecture overview.
            - Provide module interfaces, ports, and parameters.
            - Include state machine diagrams in ASCII or Mermaid.
            - Include timing diagrams if applicable.
            - Link to relevant RTL files and testbenches.
            - Provide rationale for design choices and constraints.

            DELIVERABLES:
            - Markdown file (*.md) in /docs/
            EOF
