name: RTL generation

on:
  issue_label:
    - "rtl requested"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md > full_context.md
      - name: Run agent
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ full_context.md }}

            TASK:
            Generate synthesizable Verilog RTL code for the requested component.
            FOLLOW these criteria:
              - Pass all interface spec constraints
              - Include synchronous reset
              - Provide comments explaining each state
              - Pass all existing test vectors in TESTPLAN.md
            VALIDATE:
              - Module must compile with Icarus Verilog and Verilator.
            EOF
      - name: Validate RTL
        run: |
          iverilog -o out.vvp rtl/*.v tb/*.v
          verilator --lint-only rtl/*.v
