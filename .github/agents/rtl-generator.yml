name: RTL Generation

on:
  issue_label:
    - "rtl requested"

jobs:
  generate_rtl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md NAMING_CONVENTIONS.md TESTPLAN.md > full_context.md

      - name: Run AI agent to generate RTL
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ full_context.md }}

            TASK:
            Generate synthesizable RTL for module {{module_name}}.
            Follow RTL template instructions, include MANDATORY JSON OUTPUT.
            EOF

      - name: Parse AI JSON output
        id: parse_json
        run: |
          echo "$AGENT_OUTPUT" | jq '.' > agent_output.json
          simulation_passed=$(jq '.simulation_passed' agent_output.json)
          coverage=$(jq '.coverage_percentage' agent_output.json)
          if [ "$simulation_passed" != "true" ]; then
            echo "Simulation failed according to agent output."
            gh issue create \
              --title "RTL Simulation Failed: {{module_name}}" \
              --body "Agent-generated RTL failed simulation. JSON output:\n$(cat agent_output.json)"
            exit 1
          fi
          echo "JSON validated successfully. Coverage: $coverage%"

      - name: Commit generated files
        run: |
          git add rtl/*.v
          git commit -m "Add AI-generated RTL for {{module_name}}"
          git push
