name: AI-Assisted Task
description: Create a structured AI task for RTL/Testbench/Documentation/Verification
title: "[AI] "
labels: ['AI-task']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "Choose the type of AI task. Then add the matching label to trigger the pipeline: 'rtl requested', 'tb requested', or 'doc requested'."
      options:
        - RTL
        - Testbench
        - Documentation
        - Verification
        - Setup
      default: 0   # index of "RTL"
    validations:
      required: true

  - type: input
    id: module_name
    attributes:
      label: "Module name"
      description: "Required for RTL, Testbench, and Documentation tasks. Must match ARCHITECTURE.md (e.g. my_fsm, uart_tx). Use 'N/A' for Setup or Verification."
      placeholder: "e.g. my_module"
    validations:
      required: false

  - type: textarea
    id: issue_description
    attributes:
      label: "Issue Description"
      description: "Use the template from docs/INSTRUCTION.md (Task, Reference, Requirements, Deliverables, Notes) or paste your task description. The agent reads ARCHITECTURE.md and docs/PLAN.md."
      placeholder: |
        # Task: <Module Name>
        ## Reference
        - ARCHITECTURE.md section: ...
        - Implementation Plan task: ...
        ## Requirements
        - RTL module name: <module_name>
        - Inputs / Outputs: ...
        ## Deliverables
        1. RTL in rtl/<module_name>.v 2. TB in tb/<module_name>_tb.v 3. Docs in docs/<module_name>.md 4. JSON summary
      value: ""
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Set the priority of this AI task."
      options:
        - High
        - Medium
        - Low
      default: 1   # index of "Medium"
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: "Additional Notes (Optional)"
      description: "Extra instructions for the AI agent."
      placeholder: "Example: follow coding style, include FSM comments, specific test cases."
      value: "No additional notes."
