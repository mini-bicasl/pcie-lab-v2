name: AI-Assisted Task
description: Create a structured AI task for specification, planning, or implementation
title: "[AI] "
labels: ['AI-task']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "Choose the phase of the flow this issue represents."
      options:
        - Specification
        - Planning
        - Implementation
        - Verification
      default: 0   # index of "Specification"
    validations:
      required: true

  - type: input
    id: module_name
    attributes:
      label: "Module name"
      description: "Required only for Implementation issues that target a specific module (must match ARCHITECTURE.md, e.g. alu8, uart_tx). For Specification or Planning you can use 'N/A'."
      placeholder: "e.g. alu8, uart_tx, ddr4_ctrl_top"
    validations:
      required: false

  - type: textarea
    id: issue_description
    attributes:
      label: "Issue Description"
      description: "Describe in plain language what you want. For example: 'Implement a commercial server‑grade DDR4 controller with ECC, refresh logic, and configurable timing parameters.' The workflow will read ARCHITECTURE.md and docs/PLAN.md automatically."
      placeholder: "Describe the RTL module / testbench / documentation, verification task, or high‑level idea you want the AI to work on."
    validations:
      required: false

  - type: checkboxes
    id: verification_focus
    attributes:
      label: "Verification focus (optional)"
      description: "Only relevant when Issue Type is 'Verification'. Select what you want to improve, based on INSTRUCTION.md Step 4 (e.g. lines 127‑129)."
      options:
        - label: "Add more tests (new scenarios, corner cases, stress tests)"
          required: false
        - label: "Tighten constraints (protocol/timing/assertions/coverage goals)"
          required: false
        - label: "Refine RTL or documentation based on failing tests or coverage gaps"
          required: false
